[package]
name = "mdpilot"
version = "0.1.0"
edition = "2021"
rust-version = "1.92"
description = "Native GUI app that previews Markdown while Claude Code edits it"
publish = false

[[bin]]
name = "mdpilot"
path = "src/main.rs"

[dependencies]
directories = "6"
eframe = "0.34"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = "0.3"

[profile.release]
lto = "thin"
codegen-units = 1
