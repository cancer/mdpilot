[package]
name = "mdpilot"
version = "0.1.0"
edition = "2021"
rust-version = "1.92"
description = "Native GUI app that previews Markdown while Claude Code edits it"
publish = false

[[bin]]
name = "mdpilot"
path = "src/main.rs"

[dependencies]
chrono = { version = "0.4", default-features = false, features = ["clock", "serde", "std"] }
directories = "6"
eframe = "0.34"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = "0.3"
uuid = { version = "1", features = ["v4"] }

# Used only by the debug-build screenshot helper (cfg(debug_assertions)).
# In release builds the helper is compiled out, so this dep is dead-stripped.
image = { version = "0.25", default-features = false, features = ["png"] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tempfile = "3"

[profile.release]
lto = "thin"
codegen-units = 1
